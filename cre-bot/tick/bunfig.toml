[test]
coverage = true
coverageReporter = ["text", "lcov"]
coverageThreshold = { line = 1.0, function = 1.0, statement = 1.0, branch = 1.0 }
# Exclude pure-type files (no executable lines), wiring, and build artifacts
coveragePathIgnorePatterns = [
  "src/ports/",
  "src/domain/models/",
  "src/entry-point/",
  "src/entry-point/.cre_build_tmp.js",
  ".cre_build_tmp.js",
]
